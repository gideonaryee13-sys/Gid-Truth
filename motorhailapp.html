
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;
  --surface:#12151a;
  --surface2:#1a1e26;
  --surface3:#222733;
  --border:#2a303d;
  --border2:#363e50;
  --text:#f0f2f5;
  --text2:#8b93a8;
  --text3:#555e72;
  --green:#22c97a;
  --green-d:#0e6e42;
  --green-bg:rgba(34,201,122,0.1);
  --amber:#f5a623;
  --amber-bg:rgba(245,166,35,0.1);
  --red:#e8453c;
  --red-bg:rgba(232,69,60,0.1);
  --blue:#4a9fff;
  --blue-bg:rgba(74,159,255,0.1);
  --accent:#22c97a;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:600px;overflow:hidden}
h1,h2,h3,.label{font-family:'Syne',sans-serif}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:600px;background:var(--bg);position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(34,201,122,0.07) 0%,transparent 70%);pointer-events:none}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:380px;position:relative;z-index:1}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-circle{width:38px;height:38px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center}
.logo-circle i{font-size:20px;color:#000}
.login-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.login-logo-text span{color:var(--green)}
.login-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.role-card{border:1.5px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.role-card:hover{border-color:var(--green);background:var(--green-bg)}
.role-card.selected{border-color:var(--green);background:var(--green-bg)}
.role-card i{font-size:22px;color:var(--text2);display:block;margin-bottom:6px}
.role-card.selected i{color:var(--green)}
.role-card .role-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.role-card.selected .role-name{color:var(--green)}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.btn-primary{width:100%;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:12px;cursor:pointer;letter-spacing:.02em;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px}
.login-hint span{color:var(--text2)}

/* APP SHELL */
#app-shell{display:none;min-height:600px;background:var(--bg)}
.shell-inner{display:flex;min-height:600px}

/* SIDEBAR */
.sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:28px;height:28px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center}
.sb-logo-icon i{font-size:15px;color:#000}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sb-logo-text span{color:var(--green)}
.sb-role-pill{margin-top:8px;display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:20px}
.pill-admin{background:rgba(74,159,255,.15);color:var(--blue)}
.pill-rider{background:var(--amber-bg);color:var(--amber)}
.pill-passenger{background:var(--green-bg);color:var(--green)}
.sb-nav{flex:1;padding:12px 8px}
.sb-section-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:4px;margin-top:12px;font-family:'Syne',sans-serif}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--green-bg);color:var(--green)}
.sb-item i{font-size:16px}
.sb-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;color:#000}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-email{font-size:10px;color:var(--text3)}
.sb-logout{cursor:pointer;color:var(--text3);font-size:15px;padding:4px}
.sb-logout:hover{color:var(--red)}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.topbar-subtitle{font-size:12px;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:8px}
.top-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;font-family:'Syne',sans-serif}
.badge-live{background:var(--green-bg);color:var(--green)}
.badge-online{background:var(--green-bg);color:var(--green)}
.badge-offline{background:var(--surface3);color:var(--text2)}

.content-area{flex:1;overflow-y:auto;padding:20px}
.screen{display:none}
.screen.active{display:block}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metrics-row.three{grid-template-columns:repeat(3,1fr)}
.metrics-row.two{grid-template-columns:repeat(2,1fr)}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.metric-label{font-size:11px;color:var(--text2);font-weight:500;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.metric-sub.up{color:var(--green)}
.metric-sub.down{color:var(--red)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.06em}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;font-size:10px;color:var(--text3);font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;border-bottom:1px solid var(--border)}
.data-table td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}

/* BADGES */
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;font-family:'Syne',sans-serif;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--surface2);color:var(--text2)}

/* MAP */
.map-box{height:180px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);position:relative;overflow:hidden}
.map-roads{position:absolute;inset:0}
.map-pin{position:absolute;transform:translate(-50%,-50%)}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bg)}
.pin-pulse{position:absolute;width:24px;height:24px;border-radius:50%;top:-6px;left:-6px;animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
.map-legend{position:absolute;bottom:8px;right:8px;background:rgba(10,12,15,.85);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:10px;display:flex;flex-direction:column;gap:3px}
.legend-row{display:flex;align-items:center;gap:5px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:12px;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--text2);border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);background:#000}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.02em}
.btn-green{background:var(--green);color:#000;border-color:var(--green)}
.btn-green:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.btn-approve{background:var(--green-bg);color:var(--green);border-color:transparent;font-size:11px;padding:5px 10px}
.btn-reject{background:var(--red-bg);color:var(--red);border-color:transparent;font-size:11px;padding:5px 10px}

/* RIDE REQUEST CARD */
.ride-request-card{background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.ride-request-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green)}
.rrc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rrc-id{font-family:'Syne',sans-serif;font-size:11px;color:var(--text3);font-weight:700}
.rrc-fare{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--green)}
.rrc-route{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;padding:10px;background:var(--surface2);border-radius:8px}
.rrc-from,.rrc-to{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text)}
.rrc-from i{color:var(--green);font-size:13px}
.rrc-to i{color:var(--red);font-size:13px}
.rrc-meta{display:flex;gap:10px;margin-bottom:12px}
.rrc-chip{background:var(--surface2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.rrc-chip i{font-size:12px}
.rrc-actions{display:flex;gap:8px}
.rrc-actions .btn{flex:1;justify-content:center}

/* FARE ESTIMATE */
.fare-box{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:14px}
.fare-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.fare-row:last-child{border-bottom:none}
.fare-label{font-size:12px;color:var(--text2)}
.fare-val{font-size:13px;font-weight:500;color:var(--text)}

/* DESTINATION INPUT */
.dest-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px 10px 34px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;margin-bottom:8px;position:relative}
.dest-input:focus{border-color:var(--green)}
.input-wrap{position:relative;margin-bottom:10px}
.input-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

/* RATING STARS */
.stars{display:flex;gap:4px}
.star{font-size:20px;cursor:pointer;color:var(--text3);transition:color .1s}
.star.lit{color:var(--amber)}

/* PROGRESS */
.progress-track{height:4px;background:var(--surface3);border-radius:2px;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .5s}

/* RIDER STATUS CARD */
.status-header{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px}
.online-indicator{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.online-dot.off{background:var(--text3)}

/* NOTIFICATION */
.notif{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.notif i{font-size:16px;margin-top:1px}
.notif-text{font-size:12px;color:var(--text2);line-height:1.4}
.notif-time{font-size:10px;color:var(--text3);margin-top:2px}

/* SCROLLBAR */
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-track{background:transparent}
.content-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.two-col-6040{display:grid;grid-template-columns:1.2fr 0.8fr;gap:16px}

/* ACTIVE TRIP BANNER */
.trip-banner{background:linear-gradient(135deg,var(--green-bg),rgba(34,201,122,.04));border:1px solid rgba(34,201,122,.3);border-radius:12px;padding:16px;margin-bottom:16px}
.trip-banner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trip-stage{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em}
.trip-timer{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)}

/* CHART BARS */
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:3px 3px 0 0;background:var(--surface3);transition:height .3s}
.bar.highlight{background:var(--green)}
.bar-lbl{font-size:9px;color:var(--text3);font-family:'Syne',sans-serif}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;display:none;z-index:999;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.two-col>.card,.two-col-6040>.card{margin-bottom:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-circle"><i class="ti ti-motorbike"></i></div>
      <div class="login-logo-text">Moto<span>GO</span></div>
    </div>
    <div class="login-title">Sign in to your portal</div>
    <div class="login-sub">Choose your role and enter credentials</div>
    <div class="role-grid">
      <div class="role-card selected" onclick="selectRole('admin',this)" id="role-admin">
        <i class="ti ti-shield-lock"></i>
        <div class="role-name">Admin</div>
      </div>
      <div class="role-card" onclick="selectRole('rider',this)" id="role-rider">

        <div class="role-name">Rider</div>
      </div>
      <div class="role-card" onclick="selectRole('passenger',this)" id="role-passenger">
        <i class="ti ti-user"></i>
        <div class="role-name">Passenger</div>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@motogo.com" value="admin@motogo.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" value="password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign in</button>
    <div class="login-hint">Demo: <span>admin / rider / passenger</span> — any password works</div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div class="shell-inner">
    <div class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="sb-logo">
          <div class="sb-logo-icon"><i class="ti ti-motorbike"></i></div>

        </div>
        <div class="sb-role-pill" id="role-pill">Admin</div>
      </div>
      <div class="sb-nav" id="sb-nav"></div>
      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar" id="sb-avatar">AD</div>
          <div class="sb-user-info">
            <div class="sb-user-name" id="sb-name">Admin</div>
            <div class="sb-user-email" id="sb-email">admin@motogo.com</div>
          </div>
          <div class="sb-logout" onclick="logout()" title="Logout"><i class="ti ti-logout"></i></div>
        </div>
      </div>
    </div>
    <div class="main-area">
      <div class="topbar">
        <div class="topbar-left">
          <div>
            <div class="topbar-title" id="topbar-title">Dashboard</div>
            <div class="topbar-subtitle" id="topbar-sub">Accra, Ghana · Live</div>
          </div>
        </div>
        <div class="topbar-right">
          <span class="top-badge badge-live" id="topbar-badge"><i class="ti ti-circle-filled" style="font-size:8px;vertical-align:1px;margin-right:3px"></i>Live</span>
        </div>
      </div>
      <div class="content-area" id="content-area"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── DB (localStorage) ───────────────────────────────────────────
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('moto_'+k))||null}catch{return null}},
  set(k,v){localStorage.setItem('moto_'+k,JSON.stringify(v))},

      {id:'r3',name:'Nii Darko',email:'nii@motogo.com',phone:'+233 24 111 0003',status:'riding',rating:4.8,trips:451,earnings:9020,plate:'GR-3344-22',approved:true},
      {id:'r4',name:'Akwesi Frimpong',email:'akwesi@motogo.com',phone:'+233 24 111 0004',status:'offline',rating:4.6,trips:88,earnings:1760,plate:'GR-5566-23',approved:true},
      {id:'r5',name:'Kwame Asante',email:'kwame@motogo.com',phone:'+233 24 222 0005',status:'pending',rating:0,trips:0,earnings:0,plate:'GR-7788-24',approved:false},
      {id:'r6',name:'Ama Sarpong',email:'ama@motogo.com',phone:'+233 24 222 0006',status:'pending',rating:0,trips:0,earnings:0,plate:'GR-9900-24',approved:false},
    ]);
    if(!this.get('passengers'))this.set('passengers',[

let timerInterval=null;
let timerSec=0;
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSec++;
    const el=document.getElementById('trip-timer');
    if(el){const m=Math.floor(timerSec/60);const s=timerSec%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
    else clearInterval(timerInterval);
  },1000);
}

function toggleRiderOnline(el){
  riderOnline=el.checked;
  showToast(riderOnline?'You are now online!':'You went offline.');
  renderScreen('r-home');
}
function acceptRide(){activeRequest=true;showToast('Ride accepted! Navigate to passenger.');renderScreen('r-home');}
function declineRide(){showToast('Ride declined.');renderScreen('r-home');}
function completeRide(){
  clearInterval(timerInterval);timerSec=0;activeRequest=null;
  const rides=DB.get('rides');
  rides.unshift({id:'#1043',passenger:'Efua Owusu',rider:'Kofi Asante',from:'Osu',to:'Airport',fare:22,status:'completed',time:new Date().toTimeString().slice(0,5),rating:null});
  DB.set('rides',rides);
  const stats=DB.get('stats');stats.trips++;stats.revenue+=22;DB.set('stats',stats);
  showToast('Trip completed! GH₵ 22 earned.');
  renderScreen('r-home');
}

function calcFare(){
  const to=document.getElementById('to-input').value;
  if(!to){showToast('Enter a destination first.');return;}
  const fare=Math.floor(Math.random()*25)+8;
  const dist=(Math.random()*8+1).toFixed(1);
  const eta=Math.floor(dist*2.5)+5;
  document.getElementById('fare-preview').style.display='block';
  document.getElementById('est-fare').textContent=`GH₵ ${fare}`;
  document.getElementById('est-dist').textContent=`${dist} km`;
  document.getElementById('est-eta').textContent=`~${eta} min`;
  document.getElementById('book-btn').style.display='flex';
  window._fareData={fare,dist,eta,to};
}

function bookRide(){
  const fd=window._fareData||{fare:18,to:'Kotoka Airport'};
  const rider=DB.get('riders').find(r=>r.status==='online');
  currentBooking={stage:'Rider en route',fare:fd.fare,from:'Osu, Accra',to:fd.to,riderName:rider.name,plate:rider.plate,rating:rider.rating};
  const rides=DB.get('rides');
  rides.unshift({id:'#1044',passenger:'Efua Owusu',rider:rider.name,from:'Osu',to:fd.to,fare:fd.fare,status:'active',time:new Date().toTimeString().slice(0,5),rating:null});
  DB.set('rides',rides);
  showToast('Ride requested! Matching you with a rider...');
  renderScreen('p-home');
}

function rateRide(id,n){

// ─── UTILS ───────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.style.display='none',2500);
}
